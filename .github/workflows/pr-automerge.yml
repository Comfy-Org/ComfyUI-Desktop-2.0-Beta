name: Enable PR Auto-Merge

# Lets the team flip auto-merge on a PR by adding the `automerge` label.
# GitHub then merges the PR automatically as soon as required checks
# pass and required reviews are in. Removing the label cancels it.
#
# Requires the repo's "Allow auto-merge" setting to be on
# (Settings → General → Pull Requests → Allow auto-merge).

on:
  pull_request_target:
    types:
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  toggle:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Toggle auto-merge based on label

    steps:
      - name: Enable auto-merge
        if: github.event.action == 'labeled' && github.event.label.name == 'automerge'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --auto \
            --squash

      - name: Cancel auto-merge
        if: github.event.action == 'unlabeled' && github.event.label.name == 'automerge'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --disable-auto || true
