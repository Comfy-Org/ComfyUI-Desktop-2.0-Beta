name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-proprietary-fonts:
    name: No proprietary fonts in source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure PP Formula is not committed
        run: |
          set -euo pipefail
          # PP Formula (Pangram Pangram) is license-restricted and must never be
          # committed to this public repo. It is fetched at build time from
          # gs://comfy-org-fonts (see scripts/fetch-font.mjs). This guard fails
          # the build if any PP Formula binary is tracked in git.
          matches="$(git ls-files '*PPFormula*' '*ppformula*' '*pp-formula*' '*pp_formula*' || true)"
          if [ -n "$matches" ]; then
            echo "::error::Proprietary PP Formula font files are committed to the repo:"
            echo "$matches"
            echo "These are license-restricted and must not live in source."
            echo "They are fetched at build time from gs://comfy-org-fonts (scripts/fetch-font.mjs)."
            exit 1
          fi
          echo "OK: no proprietary PP Formula font files tracked in git."

  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: pnpm run lint
          - name: Typecheck
            command: pnpm run typecheck
          - name: Test
            command: pnpm run test
          - name: Test (integration)
            command: pnpm run test:integration

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  e2e:
    name: E2E (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            command: pnpm run test:e2e:macos
          - platform: windows
            os: windows-latest
            command: pnpm run test:e2e:windows
          - platform: linux
            os: ubuntu-latest
            command: pnpm run test:e2e:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Run E2E (${{ matrix.platform }})
        run: ${{ matrix.platform == 'linux' && format('xvfb-run --auto-servernum {0}', matrix.command) || matrix.command }}

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.platform }}-failure
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
