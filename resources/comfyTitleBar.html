<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
    body {
      background: #353535;
      app-region: drag;
      display: flex;
      align-items: center;
      padding-left: 12px;
      box-sizing: border-box;
      font: 12px/1 system-ui, sans-serif;
      color: #999;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <span id="title">ComfyUI</span>
  <script>
    window.__updateTheme = function(bg, text) {
      if (bg) document.body.style.background = bg;
      if (text) document.body.style.color = text;
      if (bg) {
        // Parse the background to determine if it's dark or light for border contrast
        var d = document.createElement('canvas').getContext('2d');
        d.fillStyle = bg;
        var hex = d.fillStyle;
        var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
        var lum = (r*299 + g*587 + b2*114) / 1000;
        document.body.style.borderBottomColor = lum < 128 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.12)';
      }
    };
  </script>
</body>
</html>
