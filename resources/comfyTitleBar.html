<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!--
    Loaded from disk into a WebContentsView; no network resources, so the CSP
    just needs to disable any external loads. Inline script is required for
    the bridge wire-up below.
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:;">
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
    body {
      background: #353535;
      app-region: drag;
      display: flex;
      align-items: stretch;
      padding-left: 12px;
      padding-right: 140px; /* Reserve space for native window controls (Win/Linux) */
      box-sizing: border-box;
      font: 12px/1 system-ui, sans-serif;
      color: #ccc;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    body.is-mac {
      padding-left: 78px;
      padding-right: 12px;
    }
    .panel-tabs {
      display: flex;
      align-items: center;
      app-region: no-drag;
      flex: 0 1 auto;
      min-width: 0;
      gap: 4px;
    }
    .panel-tabs button {
      app-region: no-drag;
      background: transparent;
      color: inherit;
      border: 1px solid transparent;
      padding: 4px 10px;
      font: inherit;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.75;
      display: inline-flex;
      align-items: center;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background-color 0.12s, opacity 0.12s, border-color 0.12s;
    }
    .panel-tabs button:hover {
      opacity: 1;
      background: rgba(255,255,255,0.06);
    }
    .panel-tabs button.active {
      opacity: 1;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.18);
    }
    /* The comfy tab is the install identity — emphasised so it reads as the
       window's primary label rather than as a peer of the settings buttons. */
    .panel-tabs button[data-panel="comfy"] {
      font-weight: 500;
    }
    body.is-light .panel-tabs button:hover { background: rgba(0,0,0,0.06); }
    body.is-light .panel-tabs button.active {
      background: rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.18);
    }
    /* Spacer pushes nothing — the empty flex region absorbs drag space. */
    .drag-spacer {
      flex: 1 1 auto;
      min-width: 0;
      app-region: drag;
    }
  </style>
</head>
<body>
  <div id="panel-buttons" class="panel-tabs">
    <button data-panel="comfy" type="button"></button>
    <button data-panel="install-settings" type="button"></button>
    <button data-panel="launcher-settings" type="button"></button>
  </div>
  <div class="drag-spacer"></div>
  <script>
    (function () {
      var bridge = window.__comfyTitleBar;
      if (!bridge) return;

      if (bridge.isMac()) document.body.classList.add('is-mac');

      // The comfy tab acts as the install identity — its label is the install
      // name + source label pushed by main via comfy-titlebar:title-changed.
      // The other two tabs have static labels (kept in sync with locales/en.json
      // titleBar.panelInstallSettings / titleBar.panelLauncherSettings — title
      // bar isn't localized yet since it's a separate WebContents).
      var staticLabels = {
        'install-settings': 'Install Settings',
        'launcher-settings': 'Launcher Settings',
      };
      var buttonEls = Array.prototype.slice.call(
        document.querySelectorAll('#panel-buttons button')
      );
      buttonEls.forEach(function (btn) {
        var key = btn.getAttribute('data-panel');
        if (staticLabels[key]) btn.textContent = staticLabels[key];
        btn.addEventListener('click', function () {
          bridge.setPanel(key);
        });
      });

      var comfyBtn = document.querySelector('#panel-buttons button[data-panel="comfy"]');

      function setActive(panel) {
        buttonEls.forEach(function (btn) {
          btn.classList.toggle('active', btn.getAttribute('data-panel') === panel);
        });
      }

      function setTitle(text) {
        // The comfy tab IS the title — it shows the install name + source.
        // Fallback so the tab is never empty before main pushes a value.
        if (comfyBtn) comfyBtn.textContent = text || 'ComfyUI';
      }

      function applyTheme(bg, text) {
        if (bg) document.body.style.background = bg;
        if (text) document.body.style.color = text;
        if (bg) {
          var d = document.createElement('canvas').getContext('2d');
          d.fillStyle = bg;
          var hex = d.fillStyle;
          var r = parseInt(hex.slice(1, 3), 16);
          var g = parseInt(hex.slice(3, 5), 16);
          var b = parseInt(hex.slice(5, 7), 16);
          var lum = (r * 299 + g * 587 + b * 114) / 1000;
          var isLight = lum >= 128;
          document.body.style.borderBottomColor = isLight ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.08)';
          document.body.classList.toggle('is-light', isLight);
        }
      }

      bridge.onPanelChanged(setActive);
      bridge.onTitleChanged(setTitle);
      bridge.onThemeChanged(function (theme) { applyTheme(theme.bg, theme.text); });

      // Expose for legacy / direct test access
      window.__setTitle = setTitle;
      window.__updateTheme = applyTheme;
      window.__setActivePanel = setActive;

      bridge.ready();
    })();
  </script>
</body>
</html>
